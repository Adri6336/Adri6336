<!-- Perspective grid -->
<g stroke="#1e4d82" stroke-width="0.8" opacity="0.9">
  <!-- Vertical lines converging at VP (450, 220) -->
  <line x1="450" y1="220" x2="0"   y2="450"/>
  <line x1="450" y1="220" x2="75"  y2="450"/>
