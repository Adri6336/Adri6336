<svg xmlns="http://www.w3.org/2000/svg" width="900" height="450" viewBox="0 0 900 450">
<defs>
<style>
.rg{font-family:'Courier New',Courier,monospace;font-size:13px;}
.rt{fill:#2e6299;}
@keyframes fall{from{transform:translateY(-200px)}to{transform:translateY(450px)}}
@keyframes ga{
  0%,56%,100%{fill:#cce8ff;filter:none}
  58%{fill:#ff2020;filter:drop-shadow(5px 0 0 rgba(255,40,40,.5))}
  60%{fill:#ff2020;filter:drop-shadow(-4px 0 0 rgba(255,40,40,.45))}
  62%{fill:#ff2020;filter:drop-shadow(3px 0 0 rgba(255,40,40,.4))}
  64%{fill:#ff2020;filter:none}
  67%{fill:#ff6655}
  70%{fill:#cce8ff}
}
@keyframes gb{
  0%,36%,100%{fill:#cce8ff;filter:none}
  38%{fill:#ff2020;filter:drop-shadow(-6px 0 0 rgba(255,40,40,.45))}
  40%{fill:#ff2020;filter:drop-shadow(4px 0 0 rgba(255,40,40,.5))}
  42%{fill:#ff2020;filter:drop-shadow(-2px 0 0 rgba(255,40,40,.35))}
  44%{fill:#ff2020;filter:none}
  47%{fill:#ff6655}
  50%{fill:#cce8ff}
}
@keyframes gc{
  0%,71%,100%{fill:#cce8ff;filter:none}
  73%{fill:#ff2020;filter:drop-shadow(5px 0 0 rgba(255,40,40,.4))}
  75%{fill:#ff2020;filter:drop-shadow(-3px 0 0 rgba(255,40,40,.5))}
  77%{fill:#ff2020;filter:drop-shadow(4px 0 0 rgba(255,40,40,.4))}
  79%{fill:#ff2020;filter:none}
  82%{fill:#ff5544}
  85%{fill:#cce8ff}
}
</style>
<clipPath id="sky"><rect x="0" y="0" width="900" height="220"/></clipPath>
<radialGradient id="atmo" cx="50%" cy="100%" r="60%" gradientUnits="objectBoundingBox">
  <stop offset="0%" stop-color="#182848" stop-opacity="1"/>
  <stop offset="100%" stop-color="#030810" stop-opacity="0"/>
</radialGradient>
<radialGradient id="sg" cx="50%" cy="100%" r="55%" gradientUnits="objectBoundingBox">
  <stop offset="0%" stop-color="#2255cc" stop-opacity=".45"/>
  <stop offset="65%" stop-color="#1133aa" stop-opacity=".15"/>
  <stop offset="100%" stop-color="#061122" stop-opacity="0"/>
</radialGradient>
<linearGradient id="sf" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#99bbff"/>
  <stop offset="50%" stop-color="#5577ee"/>
  <stop offset="100%" stop-color="#2244cc"/>
</linearGradient>
</defs>

<!-- Full background -->
<rect width="900" height="450" fill="#020709"/>
<!-- Sky atmosphere -->
<rect width="900" height="220" fill="url(#atmo)"/>
<!-- Sun glow at horizon -->
<ellipse cx="450" cy="220" rx="220" ry="95" fill="url(#sg)"/>
<!-- Ground covers below horizon -->
<rect x="0" y="220" width="900" height="230" fill="#020709"/>

<!-- Sun body clipped to sky -->
<circle cx="450" cy="226" r="72" fill="url(#sf)" clip-path="url(#sky)"/>
<circle cx="450" cy="226" r="54" fill="#ccdcff" opacity=".15" clip-path="url(#sky)"/>

<!-- Binary rain clipped to sky -->
<g clip-path="url(#sky)" class="rg">

<!-- Col 1 x=20 dur=2.4s del=-0.5s -->
