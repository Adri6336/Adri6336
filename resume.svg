<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" width="100%" height="100%">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
    .rg { font-family: 'Courier New', Courier, monospace; font-size: 11px; }
    .rt { fill: #1e5080; }
    .digital-text {
      font-family: 'Share Tech Mono', 'Courier New', Courier, monospace;
      text-anchor: middle;
      pointer-events: auto;
      user-select: auto;
    }
    .text-primary  { fill: #00e5ff; font-size: 24px; letter-spacing: 1px; }
    .text-highlight { fill: #08f500; font-size: 28px; font-weight: bold; letter-spacing: 2px; }

    @keyframes fall { from{transform:translateY(-84px)} to{transform:translateY(120px)} }
    @keyframes f0 { 0%,49.9%{opacity:1} 50%,100%{opacity:0} }
    @keyframes f1 { 0%,49.9%{opacity:0} 50%,100%{opacity:1} }

    @keyframes gna { 0%,52%,100%{opacity:1} 54%,70%{opacity:0} }
    @keyframes gnb { 0%,33%,100%{opacity:1} 35%,52%{opacity:0} }
    @keyframes gga {
      0%,52%,100%{opacity:0;filter:none}
      54%{opacity:1;fill:#ff2020;filter:drop-shadow(6px 0 0 rgba(255,20,20,.6))}
      58%{opacity:1;fill:#ff2020;filter:drop-shadow(-5px 0 0 rgba(255,20,20,.5))}
      62%{opacity:1;fill:#ff2020;filter:none}
      65%{opacity:1;fill:#ff5533}
      69%{opacity:1;fill:#ff2020}
      70%{opacity:0;filter:none}
    }
    @keyframes ggb {
      0%,33%,100%{opacity:0;filter:none}
      35%{opacity:1;fill:#ff2020;filter:drop-shadow(-7px 0 0 rgba(255,20,20,.55))}
      39%{opacity:1;fill:#ff2020;filter:drop-shadow(5px 0 0 rgba(255,20,20,.5))}
      44%{opacity:1;fill:#ff2020;filter:none}
      47%{opacity:1;fill:#ff5533}
      51%{opacity:1;fill:#ff2020}
      52%{opacity:0;filter:none}
    }

    @keyframes cyan-glow {
      0%,100%{filter:drop-shadow(0 0 4px rgba(0,229,255,.55))}
      50%{filter:drop-shadow(0 0 14px rgba(0,229,255,1)) drop-shadow(0 0 28px rgba(0,229,255,.3))}
    }
    @keyframes green-glitch {
      0%,100%{filter:drop-shadow(0 0 6px rgba(8,245,0,.7));fill:#08f500}
      38%{filter:drop-shadow(0 0 18px rgba(8,245,0,1)) drop-shadow(0 0 35px rgba(8,245,0,.35));fill:#6fff6c}
      40%{filter:drop-shadow(0 0 3px rgba(8,245,0,.4));fill:#08f500;transform:translateX(-2px)}
      42%{filter:drop-shadow(0 0 15px rgba(8,245,0,.9));fill:#08f500;transform:translateX(0)}
      44%{filter:drop-shadow(0 0 18px rgba(8,245,0,1));fill:#6fff6c}
      46%{filter:drop-shadow(0 0 6px rgba(8,245,0,.7));fill:#08f500}
    }
    @keyframes border-pulse {
      0%,100%{opacity:.8} 50%{opacity:1;filter:drop-shadow(0 0 4px rgba(44,117,255,.7))}
    }
    @keyframes cursor-blink {
      0%,49%{opacity:1} 50%,100%{opacity:0}
    }
  </style>
  <clipPath id="rain-clip"><rect x="0" y="0" width="900" height="120"/></clipPath>
  <radialGradient id="text-bg" cx="50%" cy="50%" r="35%">
    <stop offset="0%" stop-color="#020709" stop-opacity=".85"/>
    <stop offset="100%" stop-color="#020709" stop-opacity="0"/>
  </radialGradient>
</defs>

<!-- Background -->
<rect width="900" height="120" fill="#020709"/>

<!-- Binary rain -->
<g clip-path="url(#rain-clip)" class="rg">

<!-- col x=30 1.8s -0.4s f=.32s+0s -->
<g style="animation:fall 1.8s -0.4s linear infinite,f0 .32s 0s step-end infinite">
  <text x="30" y="0"  class="rt" opacity=".05">1</text><text x="30" y="14" class="rt" opacity=".10">0</text>
  <text x="30" y="28" class="rt" opacity=".20">1</text><text x="30" y="42" class="rt" opacity=".35">0</text>
  <text x="30" y="56" class="rt" opacity=".55">1</text><text x="30" y="70" class="rt" opacity=".75">0</text>
  <text x="30" y="84" fill="#cce8ff">1</text>
</g>
<g style="animation:fall 1.8s -0.4s linear infinite,f1 .32s 0s step-end infinite">
  <text x="30" y="0"  class="rt" opacity=".05">0</text><text x="30" y="14" class="rt" opacity=".10">1</text>
  <text x="30" y="28" class="rt" opacity=".20">0</text><text x="30" y="42" class="rt" opacity=".35">1</text>
